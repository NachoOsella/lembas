name: Verify

on:
  pull_request:
  push:
    branches:
      - main
      - 'feat/**'
      - 'refactor/**'

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22.14.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: corepack enable
      - run: npm install --global npm@11.14.1
      - run: test "$(node --version)" = "v22.14.0"
      - run: test "$(npm --version)" = "11.14.1"
      - run: npm ci
      - run: npm run verify
      # The verification scripts use check-only formatters and must not rewrite the checkout.
      - run: git diff --exit-code -- .
      - run: npm audit --omit=dev --audit-level=high

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: '21.0.11'
          cache: maven
      - run: java -version 2>&1 | grep -F '21.0.11'
      - run: ./mvnw --batch-mode verify

  containers:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: docker compose --env-file docker/.env.example -f docker/compose.yml config --quiet
      - run: docker build --file docker/backend.Dockerfile --tag lembas-backend:verify .
      - run: docker build --file docker/frontend.Dockerfile --tag lembas-frontend:verify .
