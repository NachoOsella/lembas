<header class="app-store-nav">
  <div class="app-store-nav__inner">
    <!-- Brand -->
    <a [routerLink]="brand().homeRoute"
       class="app-store-nav__brand"
       aria-label="Ir al inicio">
      <img [src]="brand().logoUrl" alt=""
           width="44" height="44"
           class="app-store-nav__logo" />
      <span class="app-store-nav__brand-text">
        <strong>{{ brand().title }}</strong>
        <small>{{ brand().subtitle }}</small>
      </span>
    </a>

    <!-- Nav links (desktop center) -->
    <nav class="app-store-nav__links" aria-label="Navegacion principal">
      @for (item of navItems(); track item.label) {
        <a [routerLink]="item.path"
           routerLinkActive="app-store-nav__link--active"
           [routerLinkActiveOptions]="{ exact: item.path === '/store' }"
           class="app-store-nav__link">
          {{ item.label }}
        </a>
      }
    </nav>

    <!-- Actions (right) -->
    <div class="app-store-nav__actions">
      @if (isLoggedIn()) {
        <span class="app-store-nav__user-name">{{ userDisplayName() }}</span>
        <button
          #storeUserMenuTrigger
          class="app-store-nav__menu-btn"
          aria-label="Abrir menu de usuario"
          (click)="userMenu.toggle($event)"
        >
          <i class="pi pi-user" aria-hidden="true"></i>
          <i class="pi pi-chevron-down app-store-nav__chevron" aria-hidden="true"></i>
        </button>
        <p-menu
          #userMenu
          [model]="userMenuItems()"
          [popup]="true"
          appendTo="body"
          aria-label="Opciones de usuario"
        />
      } @else {
        <a routerLink="/auth/login"
           class="app-store-nav__login">
          Ingresar
        </a>
        <a routerLink="/auth/register"
           class="app-store-nav__cta">
          Crear cuenta
        </a>
      }

      <!-- Cart -->
      <a routerLink="/customer/checkout"
         class="app-store-nav__cart"
         aria-label="Ver carrito, {{ cartCount() }} productos"
         (click)="cartClick.emit()">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"
             class="app-store-nav__cart-icon">
          <circle cx="9" cy="20" r="1.5" />
          <circle cx="18" cy="20" r="1.5" />
          <path d="M1 1h3l2.5 13h11l3.5-9H5" />
        </svg>
        @if (cartCount() > 0) {
          <span class="app-store-nav__cart-badge" aria-label="Productos en carrito">{{ cartCount() }}</span>
        }
      </a>
    </div>
  </div>

  <!-- Mobile nav (second row) -->
  <nav class="app-store-nav__links--mobile" aria-label="Navegacion principal movil">
    @for (item of navItems(); track item.label) {
      <a [routerLink]="item.path"
         routerLinkActive="app-store-nav__link--active"
         [routerLinkActiveOptions]="{ exact: item.path === '/store' }"
         class="app-store-nav__link app-store-nav__link--sm">
        {{ item.label }}
      </a>
    }
  </nav>
</header>
