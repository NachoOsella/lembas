<header class="app-store-nav sticky top-0 z-[100] w-full bg-white transition-[height] duration-300 ease-in-out">
  <!-- Top decorative bar -->
  <div class="h-[4px] w-full bg-[#2f8d72]"></div>
  
  <div class="app-store-nav__inner mx-auto flex h-[64px] max-w-[1440px] items-center justify-between px-4 sm:px-6 md:h-[83px] lg:h-[99px] lg:px-10">
    <!-- Brand -->
    <a [routerLink]="brand().homeRoute" class="app-store-nav__brand flex items-center gap-3 lg:ml-[131px] md:ml-[99px] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-[#2f8d72] rounded-[4px]" aria-label="Ir al inicio">
      <img [src]="brand().logoUrl" alt="" width="32" height="32" class="app-store-nav__logo" />
      <span class="app-store-nav__brand-text hidden flex-col sm:flex">
        <strong class="text-[20px] font-semibold leading-tight tracking-[-0.01em] text-[rgba(0,0,0,0.87)]">{{ brand().title }}</strong>
      </span>
    </a>

    <!-- Center Navigation Links -->
    <nav class="hidden flex-1 justify-center gap-8 md:flex" aria-label="Navegación principal">
       <!-- Primary links go here; placeholder items if not dynamically passed -->
       <a routerLink="/store/catalog" class="text-[16px] font-medium text-[rgba(0,0,0,0.87)] tracking-[-0.01em] hover:text-[#2f8d72] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-[#2f8d72] rounded-[4px]">Tienda</a>
       <a routerLink="/store/benefits" class="text-[16px] font-medium text-[rgba(0,0,0,0.87)] tracking-[-0.01em] hover:text-[#2f8d72] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-[#2f8d72] rounded-[4px]">Beneficios</a>
       <a routerLink="/store/products" class="text-[16px] font-medium text-[rgba(0,0,0,0.87)] tracking-[-0.01em] hover:text-[#2f8d72] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-[#2f8d72] rounded-[4px]">Productos</a>
    </nav>

    <!-- Actions (right) -->
    <div class="app-store-nav__actions flex items-center gap-4">
      <!-- Search bar trigger / small screen -->
      @if (showSearch()) {
        <div class="app-store-nav__search hidden lg:block mr-2">
          <app-search-bar
            [placeholder]="searchPlaceholder()"
            size="sm"
            (search)="searchQuery.emit($event)"
          />
        </div>
      }
      
      @if (isLoggedIn()) {
        <span class="app-store-nav__user-name hidden text-[14px] font-medium text-[rgba(0,0,0,0.87)] md:inline-block">{{ userDisplayName() }}</span>
        <button
          #storeUserMenuTrigger
          class="app-store-nav__menu-btn flex h-[40px] w-[40px] items-center justify-center rounded-full bg-[#f9f9f9] text-[rgba(0,0,0,0.87)] transition-[background-color] hover:bg-[#e7e7e7]"
          aria-label="Abrir menu de usuario"
          (click)="userMenu.toggle($event)"
        >
          <i class="pi pi-user" aria-hidden="true"></i>
        </button>
        <p-menu
          #userMenu
          [model]="userMenuItems()"
          [popup]="true"
          appendTo="body"
          aria-label="Opciones de usuario"
          styleClass="w-[200px] border-none bg-[#f9f9f9] shadow-[0_4px_12px_rgba(0,0,0,0.1)] rounded-[12px]"
        />
      } @else {
        <div class="hidden items-center gap-3 sm:flex">
          <a routerLink="/auth/login" class="app-store-nav__login rounded-[50px] border border-[rgba(0,0,0,0.87)] bg-transparent px-[16px] py-[7px] text-[14px] font-semibold tracking-[-0.01em] text-[rgba(0,0,0,0.87)] transition-[transform] duration-200 ease-in-out hover:scale-[0.95] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-[#2f8d72]"> Ingresar </a>
          <a routerLink="/auth/register" class="app-store-nav__cta rounded-[50px] border border-black bg-black px-[16px] py-[7px] text-[14px] font-semibold tracking-[-0.01em] text-white transition-[transform] duration-200 ease-in-out hover:scale-[0.95] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-[#2f8d72]"> Crear cuenta </a>
        </div>
      }

      <!-- Cart - Only icon, count goes into Leaf CTA -->
      <a
        routerLink="/customer/checkout"
        class="app-store-nav__cart relative flex h-[44px] w-[44px] items-center justify-center rounded-full text-[rgba(0,0,0,0.87)] transition-colors hover:bg-[#f9f9f9] sm:hidden"
        aria-label="Ver carrito, {{ cartCount() }} productos"
        (click)="cartClick.emit()"
      >
        <i class="pi pi-shopping-bag text-xl"></i>
        @if (cartCount() > 0) {
          <span class="app-store-nav__cart-badge absolute right-2 top-2 flex h-4 w-4 items-center justify-center rounded-full bg-[#2f8d72] text-[10px] font-bold text-white" aria-label="Productos en carrito">{{
            cartCount()
          }}</span>
        }
      </a>
    </div>
  </div>

  <!-- Mobile search bar (second row) -->
  @if (showSearch()) {
    <div class="app-store-nav__search--mobile border-t border-[#e7e7e7] bg-[#f9f9f9] p-3 lg:hidden">
      <app-search-bar
        [placeholder]="searchPlaceholder()"
        size="sm"
        (search)="searchQuery.emit($event)"
      />
    </div>
  }
</header>

<!-- Floating Leaf CTA for Cart (Standard design pattern for the brand) -->
<a 
  routerLink="/customer/checkout" 
  class="fixed bottom-[calc(0.8rem+16px)] right-[calc(0.8rem+16px)] z-[100] flex h-[56px] w-[56px] items-center justify-center rounded-full bg-[#2f8d72] text-white shadow-[0_0_6px_rgba(0,0,0,0.24),_0_8px_12px_rgba(0,0,0,0.14)] transition-[transform,_box-shadow] duration-200 ease-in-out hover:scale-[0.95] hover:shadow-[0_0_6px_rgba(0,0,0,0.24),_0_8px_12px_rgba(0,0,0,0)] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-[#2f8d72]"
  aria-label="Ir al carrito de compras"
>
  <i class="pi pi-shopping-bag text-2xl"></i>
  @if (cartCount() > 0) {
    <span class="absolute -right-1 -top-1 flex h-6 w-6 items-center justify-center rounded-full border-2 border-[#2f8d72] bg-white text-[12px] font-bold text-[#2f8d72] shadow-sm">
      {{ cartCount() }}
    </span>
  }
</a>
