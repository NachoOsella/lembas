<section class="metric-strip" aria-label="Resumen de metricas">
  @for (metric of metrics(); track metric.label) {
    <article
      class="metric-strip__item"
      [class]="'metric-strip__item metric-strip__item--' + (metric.tone ?? 'forest')"
    >
      @if (metric.icon) {
        <span class="metric-strip__icon" aria-hidden="true">
          <i [class]="metric.icon"></i>
        </span>
      }
      <div class="metric-strip__copy">
        <span class="metric-strip__label">{{ metric.label }}</span>
        <strong class="metric-strip__value">{{ metric.value }}</strong>
        @if (metric.detail) {
          <span class="metric-strip__detail">{{ metric.detail }}</span>
        }
      </div>
    </article>
  }
</section>
