<button
  [type]="type()"
  [disabled]="isDisabled()"
  [class]="buttonClass()"
  [attr.aria-label]="ariaLabel()"
  [attr.aria-busy]="loading()"
  [attr.data-testid]="testId()"
>
  @if (loading()) {
    <i class="pi pi-spinner pi-spin" aria-hidden="true"></i>
    <span>{{ loadingLabel() }}</span>
  } @else {
    @if (icon()) {
      <i [class]="icon()" aria-hidden="true"></i>
    }
    <span><ng-content /></span>
  }
</button>
