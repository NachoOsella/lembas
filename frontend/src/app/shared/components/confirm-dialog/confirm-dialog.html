<p-dialog
  [visible]="visible()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [dismissableMask]="true"
  [style]="{ width: 'min(92vw, 28rem)' }"
  styleClass="confirm-dialog"
  (onHide)="onCancel()"
>
  <ng-template #header>
    <span class="confirm-dialog__eyebrow">
      {{ destructive() ? 'Accion irreversible' : 'Confirmacion requerida' }}
    </span>
  </ng-template>

  <div class="confirm-dialog__body">
    <span
      class="confirm-dialog__icon"
      [class.confirm-dialog__icon--danger]="destructive()"
      aria-hidden="true"
    >
      <i class="pi" [class.pi-check]="!destructive()" [class.pi-trash]="destructive()"></i>
    </span>

    <div class="confirm-dialog__copy">
      <h2>{{ title() }}</h2>
      <p>{{ message() }}</p>
    </div>
  </div>

  <ng-template #footer>
    <app-button variant="secondary" type="button" (click)="onCancel()">
      {{ cancelLabel() }}
    </app-button>
    <app-button
      [variant]="destructive() ? 'danger' : 'primary'"
      type="button"
      (click)="onConfirm()"
    >
      {{ confirmLabel() }}
    </app-button>
  </ng-template>
</p-dialog>
