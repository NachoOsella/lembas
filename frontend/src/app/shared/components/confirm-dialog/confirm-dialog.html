@if (visible()) {
  <div class="confirm-dialog" role="presentation">
    <button class="confirm-dialog__backdrop" type="button" aria-label="Cancelar confirmacion" (click)="onCancel()"></button>
    <section class="confirm-dialog__panel" role="dialog" aria-modal="true" aria-labelledby="confirm-dialog-title" aria-describedby="confirm-dialog-message">
      <button class="confirm-dialog__close" type="button" aria-label="Cerrar dialogo" (click)="onCancel()">
        <span class="pi pi-times" aria-hidden="true"></span>
      </button>
      <span class="confirm-dialog__icon pi" [class.pi-trash]="destructive()" [class.pi-check-circle]="!destructive()" aria-hidden="true"></span>
      <h2 id="confirm-dialog-title">{{ title() }}</h2>
      <p id="confirm-dialog-message">{{ message() }}</p>
      <div class="confirm-dialog__actions">
        <button class="confirm-dialog__button confirm-dialog__button--secondary" type="button" (click)="onCancel()">
          {{ cancelLabel() }}
        </button>
        <button class="confirm-dialog__button confirm-dialog__button--primary" [class.confirm-dialog__button--danger]="destructive()" type="button" (click)="onConfirm()">
          {{ confirmLabel() }}
        </button>
      </div>
    </section>
  </div>
}
