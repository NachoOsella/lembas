<article
  class="catalog-skeleton-card overflow-hidden rounded-xl bg-white shadow-[0_0_0.5px_rgba(0,0,0,0.14),0_1px_1px_rgba(0,0,0,0.24)]"
  aria-hidden="true"
>
  <!-- Image placeholder -->
  <div class="catalog-skeleton-card__image">
    <app-skeleton width="60%" height="60%" shape="rect" />
  </div>

  <!-- Text content placeholder -->
  <div class="catalog-skeleton-card__body">
    <!-- Brand line -->
    <app-skeleton width="40%" height="10px" shape="text" />

    <!-- Title line -->
    <div class="mt-3 space-y-2">
      <app-skeleton width="90%" height="14px" shape="text" />
      <app-skeleton width="65%" height="14px" shape="text" />
    </div>

    <!-- Price + button row -->
    <div class="mt-auto flex items-end justify-between border-t border-[#f0e6d3] pt-4">
      <div>
        <app-skeleton width="35%" height="10px" shape="text" />
        <app-skeleton width="60px" height="20px" shape="text" />
      </div>
      <app-skeleton width="40px" height="40px" shape="circle" />
    </div>
  </div>
</article>
