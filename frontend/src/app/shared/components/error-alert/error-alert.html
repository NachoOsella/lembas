<aside class="error-alert" role="alert" aria-live="assertive">
  <span class="error-alert__icon pi pi-exclamation-triangle" aria-hidden="true"></span>
  <div class="error-alert__copy">
    <h2>{{ title() }}</h2>
    <p>{{ message() }}</p>
  </div>
  @if (dismissible()) {
    <button class="error-alert__dismiss" type="button" aria-label="Cerrar alerta" (click)="onDismiss()">
      <span class="pi pi-times" aria-hidden="true"></span>
    </button>
  }
</aside>
