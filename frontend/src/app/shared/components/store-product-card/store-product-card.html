<article
  class="store-product-card group relative overflow-hidden rounded-[16px] bg-white shadow-[0_2px_8px_rgba(0,0,0,0.04)] transition-all duration-500 ease-out hover:shadow-[0_12px_32px_rgba(0,0,0,0.08)] hover:-translate-y-1 focus-within:ring-2 focus-within:ring-[#2f8d72] focus-within:ring-offset-2"
  [class.store-product-card--compact]="isCompact()"
  [ngClass]="cardClass()"
>
  <a [routerLink]="productRoute()" class="block h-full outline-none" [attr.aria-label]="detailLabel()">
    <div
      class="relative flex items-center justify-center overflow-hidden bg-[#faf6ef]"
      [class.aspect-[4/3]]="!isCompact()"
      [class.aspect-square]="isCompact()"
    >
      <!-- Subtle organic texture overlay -->
      <div class="pointer-events-none absolute inset-0 opacity-40 mix-blend-multiply" style="background-image: radial-gradient(circle at 30% 20%, rgba(242,157,82,0.08) 0%, transparent 50%), radial-gradient(circle at 70% 80%, rgba(47,141,114,0.06) 0%, transparent 50%);" aria-hidden="true"></div>

      @if (product().imageUrl) {
        <img
          [src]="product().imageUrl"
          [alt]="product().name"
          loading="lazy"
          class="h-full w-full object-contain p-6 transition-all duration-700 ease-out group-hover:scale-105 opacity-0"
          onload="this.style.opacity='1'; this.style.transform='scale(1)';"
          style="transform: scale(0.96);"
        />
      } @else {
        <div
          class="flex h-[72px] w-[72px] items-center justify-center rounded-full bg-white/80 text-[rgba(0,0,0,0.15)] shadow-sm backdrop-blur-sm"
        >
          <i class="pi pi-image text-[28px]" aria-hidden="true"></i>
        </div>
      }

      @if (product().categoryName) {
        <span
          class="absolute left-4 top-4 rounded-full bg-white/90 px-3 py-1 text-[11px] font-bold uppercase tracking-[0.12em] text-[rgba(0,0,0,0.6)] shadow-sm backdrop-blur-sm"
        >
          {{ product().categoryName }}
        </span>
      }

      <!-- Hover overlay hint -->
      <div class="absolute inset-0 flex items-center justify-center bg-[#075f36]/0 transition-all duration-500 group-hover:bg-[#075f36]/5" aria-hidden="true">
        <span class="flex h-10 w-10 translate-y-4 items-center justify-center rounded-full bg-white/90 text-[#075f36] opacity-0 shadow-lg backdrop-blur-sm transition-all duration-500 group-hover:translate-y-0 group-hover:opacity-100">
          <i class="pi pi-eye text-sm" aria-hidden="true"></i>
        </span>
      </div>
    </div>

    <div class="flex flex-col p-5" [class.min-h-[180px]]="!isCompact()">
      <p class="text-[11px] font-bold uppercase tracking-[0.12em] text-[rgba(0,0,0,0.4)]">
        {{ product().brandName || 'Lembas' }}
      </p>
      <h3
        class="mt-1.5 text-[17px] font-semibold leading-[1.25] tracking-[-0.01em] text-[rgba(0,0,0,0.87)]"
        [class.min-h-[44px]]="isCompact()"
      >
        {{ product().name }}
      </h3>
      <div class="mt-auto flex items-end justify-between border-t border-[#f0e6d3] pt-4">
        <div>
          @if (!isCompact()) {
            <span class="block text-[11px] font-bold uppercase tracking-[0.12em] text-[#2f8d72] mb-0.5">
              Precio
            </span>
          }
          <strong class="text-[22px] font-semibold tracking-[-0.02em] text-[rgba(0,0,0,0.87)]">
            ${{ product().salePrice.toLocaleString('es-AR') }}
          </strong>
        </div>
        <span
          class="flex h-[40px] w-[40px] items-center justify-center rounded-full border-[1.5px] border-[#075f36] bg-transparent text-[#075f36] transition-all duration-300 group-hover:scale-95 group-hover:bg-[#075f36] group-hover:text-white group-hover:shadow-md"
        >
          <i class="pi pi-plus text-sm" aria-hidden="true"></i>
        </span>
      </div>
    </div>
  </a>
</article>
