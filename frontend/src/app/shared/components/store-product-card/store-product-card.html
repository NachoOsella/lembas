<article
  class="store-product-card group relative overflow-hidden rounded-xl bg-white shadow-[0_0_0.5px_rgba(0,0,0,0.14),0_1px_1px_rgba(0,0,0,0.24)] transition-all duration-500 ease-out hover:shadow-[0_0_0.5px_rgba(0,0,0,0.14),0_2px_4px_rgba(0,0,0,0.16)] hover:-translate-y-1 focus-within:ring-2 focus-within:ring-[#2f8d72] focus-within:ring-offset-2"
  [class.store-product-card--compact]="isCompact()"
  [ngClass]="cardClass()"
>
  <a
    [routerLink]="productRoute()"
    class="block h-full outline-none"
    [attr.aria-label]="detailLabel()"
  >
    <div
      class="store-product-card__image"
      [class.store-product-card__image--regular]="!isCompact()"
      [class.store-product-card__image--compact]="isCompact()"
    >
      <div class="store-product-card__texture" aria-hidden="true"></div>

      @if (product().imageUrl) {
        <img
          [src]="product().imageUrl"
          [alt]="product().name"
          loading="lazy"
          class="store-product-card__img"
          onload="this.classList.add('store-product-card__img--loaded')"
        />
      } @else {
        <div class="store-product-card__placeholder">
          <i class="pi pi-image" aria-hidden="true"></i>
        </div>
      }

      @if (product().categoryName) {
        <span class="store-product-card__category">
          {{ product().categoryName }}
        </span>
      }

      <div class="store-product-card__hover" aria-hidden="true">
        <span class="store-product-card__hover-icon">
          <i class="pi pi-eye" aria-hidden="true"></i>
        </span>
      </div>
    </div>

    <div class="flex flex-col p-5" [class.min-h-[180px]]="!isCompact()">
      <p class="text-[11px] font-bold uppercase tracking-[0.12em] text-[rgba(0,0,0,0.4)]">
        {{ product().brandName || 'Lembas' }}
      </p>
      <h3
        class="mt-1.5 text-[17px] font-semibold leading-[1.25] tracking-[-0.01em] text-[rgba(0,0,0,0.87)]"
        [class.min-h-[44px]]="isCompact()"
      >
        {{ product().name }}
      </h3>
      <div class="mt-auto flex items-end justify-between border-t border-[#f0e6d3] pt-4">
        <div>
          @if (!isCompact()) {
            <span
              class="block text-[11px] font-bold uppercase tracking-[0.12em] text-[#2f8d72] mb-0.5"
            >
              Precio
            </span>
          }
          <strong class="text-[22px] font-semibold tracking-[-0.02em] text-[rgba(0,0,0,0.87)]">
            ${{ product().salePrice.toLocaleString('es-AR') }}
          </strong>
        </div>
        <span
          class="flex h-[40px] w-[40px] items-center justify-center rounded-full border-[1.5px] border-[#2f8d72] bg-transparent text-[#2f8d72] transition-all duration-300 group-hover:scale-95 group-hover:bg-[#2f8d72] group-hover:text-white group-hover:shadow-md"
        >
          <i class="pi pi-plus text-sm" aria-hidden="true"></i>
        </span>
      </div>
    </div>
  </a>
</article>
