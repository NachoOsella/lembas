<article
  class="store-product-card group overflow-hidden rounded-[12px] bg-white shadow-[0_0_0.5px_rgba(0,0,0,0.14),_0_1px_1px_rgba(0,0,0,0.24)] transition-[transform,_box-shadow] duration-300 ease-in-out hover:-translate-y-1 hover:shadow-[0_4px_12px_rgba(0,0,0,0.1)] focus-within:ring-2 focus-within:ring-[#2f8d72] focus-within:ring-offset-2"
  [class.store-product-card--compact]="isCompact()"
  [ngClass]="cardClass()"
>
  <a [routerLink]="productRoute()" class="block h-full outline-none" [attr.aria-label]="detailLabel()">
    <div
      class="relative flex items-center justify-center bg-[#f9f9f9]"
      [class.aspect-[4/3]]="!isCompact()"
      [class.aspect-square]="isCompact()"
      [class.p-[32px]]="!isCompact()"
      [class.p-[24px]]="isCompact()"
    >
      @if (product().imageUrl) {
        <img
          [src]="product().imageUrl"
          [alt]="product().name"
          loading="lazy"
          class="h-full w-full object-contain drop-shadow-sm transition-[transform] duration-500 ease-out group-hover:scale-105 opacity-0 transition-opacity"
          onload="this.style.opacity='1'"
        />
      } @else {
        <div
          class="flex h-[80px] w-[80px] items-center justify-center rounded-full bg-white text-[rgba(0,0,0,0.2)] shadow-sm"
        >
          <i class="pi pi-image text-[32px]" aria-hidden="true"></i>
        </div>
      }

      @if (product().categoryName) {
        <span
          class="absolute left-[16px] top-[16px] rounded-[4px] bg-white px-[8px] py-[4px] text-[13px] font-semibold text-[rgba(0,0,0,0.87)] tracking-[-0.01em] shadow-sm"
        >
          {{ product().categoryName }}
        </span>
      }
    </div>

    <div class="flex flex-col p-[24px]" [class.min-h-[200px]]="!isCompact()">
      <p class="text-[13px] font-semibold uppercase tracking-[0.1em] text-[rgba(0,0,0,0.58)]">
        {{ product().brandName || 'Lembas' }}
      </p>
      <h3
        class="mt-2 text-[19px] font-semibold leading-[1.3] tracking-[-0.01em] text-[rgba(0,0,0,0.87)]"
        [class.min-h-[48px]]="isCompact()"
      >
        {{ product().name }}
      </h3>
      <div class="mt-auto flex items-end justify-between border-t border-[#e7e7e7] pt-[16px]">
        <div>
          @if (!isCompact()) {
            <span class="block text-[13px] font-semibold uppercase tracking-[0.1em] text-[#2f8d72] mb-1">
              Precio
            </span>
          }
          <strong class="text-[24px] font-semibold tracking-[-0.01em] text-[rgba(0,0,0,0.87)]">
            ${{ product().salePrice.toLocaleString('es-AR') }}
          </strong>
        </div>
        <span
          class="flex h-[44px] w-[44px] items-center justify-center rounded-full border-[1.5px] border-[#2f8d72] bg-transparent text-[#2f8d72] transition-[transform,_background-color,_color] duration-200 group-hover:scale-[0.95] group-hover:bg-[#2f8d72] group-hover:text-white"
        >
          <i class="pi pi-plus" aria-hidden="true"></i>
        </span>
      </div>
    </div>
  </a>
</article>
