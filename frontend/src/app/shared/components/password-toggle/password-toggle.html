<button
  type="button"
  pButton
  severity="secondary"
  text="true"
  rounded="true"
  class="password-toggle"
  [attr.aria-label]="visible() ? 'Ocultar contrasena' : ariaLabel()"
  [attr.aria-pressed]="visible()"
  [attr.aria-controls]="fieldId() || null"
  tabindex="-1"
  (click)="visible.set(!visible())"
>
  <i [class]="visible() ? 'pi pi-eye-slash' : 'pi pi-eye'" aria-hidden="true"></i>
</button>
