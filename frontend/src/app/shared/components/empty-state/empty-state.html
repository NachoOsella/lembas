<section aria-live="polite" class="empty-state">
  <div class="empty-state__icon" aria-hidden="true">
    <i [ngClass]="icon()"></i>
  </div>

  <div class="empty-state__content">
    <h2>{{ title() }}</h2>
    <p>{{ description() }}</p>
  </div>

  @if (actionLabel()) {
    <app-button [variant]="'primary'" [size]="'md'" (click)="onAction()">
      {{ actionLabel() }}
    </app-button>
  }
</section>
