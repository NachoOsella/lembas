<section class="empty-state" aria-live="polite">
  <span class="empty-state__icon" [class]="icon()" aria-hidden="true"></span>
  <div class="empty-state__copy">
    <h2>{{ title() }}</h2>
    <p>{{ description() }}</p>
  </div>
  @if (actionLabel()) {
    <button class="empty-state__action" type="button" (click)="onAction()">
      {{ actionLabel() }}
    </button>
  }
</section>
