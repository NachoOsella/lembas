<footer class="app-store-footer mt-auto bg-[#075f36] text-white">
  <!-- Optional decorative separator -->
  <div class="h-[4px] w-full bg-[#f29d52]"></div>
  
  <div class="app-store-footer__inner mx-auto flex flex-col justify-between gap-6 px-4 py-8 sm:px-6 md:flex-row md:items-center lg:max-w-[1440px] lg:px-10 lg:py-12">
    <div class="flex flex-col gap-2">
       <span class="text-[19px] font-semibold tracking-[-0.01em] text-white">Dietética Lembas</span>
       <span class="app-store-footer__copy text-[14px] font-normal tracking-[-0.01em] text-[rgba(255,255,255,0.70)]">{{ copyright() }}</span>
    </div>
    <nav class="app-store-footer__links flex flex-wrap gap-4 sm:gap-6" aria-label="Enlaces del pie de página">
      @for (link of links(); track link.label) {
        @if (link.external) {
          <a
            [href]="link.path"
            target="_blank"
            rel="noopener noreferrer"
            class="app-store-footer__link text-[14px] font-normal tracking-[-0.01em] text-[rgba(255,255,255,0.70)] transition-colors hover:text-white focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-[#2f8d72] rounded-[4px]"
          >
            {{ link.label }}
          </a>
        } @else {
          <a 
            [routerLink]="link.path" 
            class="app-store-footer__link text-[14px] font-normal tracking-[-0.01em] text-[rgba(255,255,255,0.70)] transition-colors hover:text-white focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-[#2f8d72] rounded-[4px]"
          >
            {{ link.label }}
          </a>
        }
      }
    </nav>
  </div>
</footer>
