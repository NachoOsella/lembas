<p-select
  [inputId]="inputId()"
  [name]="name()"
  [ngModel]="value()"
  (ngModelChange)="value.set($event)"
  [options]="options()"
  optionLabel="label"
  optionValue="value"
  [placeholder]="placeholder()"
  [disabled]="disabled()"
  [loading]="loading()"
  [showClear]="showClear()"
  [filter]="filter()"
  filterBy="label"
  [filterPlaceholder]="filterPlaceholder()"
  [emptyMessage]="emptyMessage()"
  [emptyFilterMessage]="emptyFilterMessage()"
  [appendTo]="appendTo()"
/>
