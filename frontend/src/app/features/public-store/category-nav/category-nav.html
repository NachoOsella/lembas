@if (loading()) {
  <div class="catnav catnav--scroll" aria-hidden="true">
    @for (_ of [1, 2, 3, 4, 5, 6]; track _) {
      <div class="catnav__skeleton-pill"></div>
    }
  </div>
} @else if (error()) {
  <div
    class="flex items-center gap-2 rounded-full border border-[rgba(200,32,20,0.15)] bg-[hsl(4_82%_43%/_5%)] px-4 py-2 text-[13px] font-semibold text-[#c82014]"
  >
    <i class="pi pi-exclamation-circle" aria-hidden="true"></i>
    <p>No se pudieron cargar las categorias.</p>
  </div>
} @else if (categories().length) {
  <nav class="catnav catnav--scroll" aria-label="Filtro de categorias">
    <!-- "Todas" pill -->
    <button
      type="button"
      class="catnav__pill"
      [class.catnav__pill--active]="selectedCategoryId() === null"
      (click)="allSelected.emit()"
      [attr.aria-pressed]="selectedCategoryId() === null"
    >
      Todas
    </button>

    @for (cat of categories(); track cat.id) {
      <button
        type="button"
        class="catnav__pill"
        [class.catnav__pill--active]="selectedCategoryId() === cat.id"
        (click)="categorySelected.emit(cat.id)"
        [attr.aria-pressed]="selectedCategoryId() === cat.id"
      >
        {{ cat.name }}
        @if (cat.productCount > 0) {
          <span class="catnav__count">{{ cat.productCount }}</span>
        }
      </button>
    }
  </nav>
} @else {
  <p class="text-sm font-semibold text-[rgba(0,0,0,0.48)]">Aun no hay categorias disponibles.</p>
}
