<div class="product-grid" [class]="gridClass()" role="list" aria-label="Productos">
  @for (product of products(); track product.id) {
    <div class="product-grid__item" role="listitem">
      <app-store-product-card
        [product]="product"
        (addToCart)="addToCart.emit({ product: $event.product, quantity: $event.quantity })"
      />
    </div>
  }
</div>
