@if (loading()) {
  <article class="stat-card stat-card--loading" [attr.aria-busy]="true">
    <app-skeleton width="36px" height="36px" shape="circle" />
    <div class="stat-card__copy">
      <app-skeleton width="60%" height="0.85rem" />
      <app-skeleton width="80%" height="1.75rem" />
      <app-skeleton width="40%" height="0.7rem" />
    </div>
  </article>
} @else {
  <article
    class="stat-card"
    [ngClass]="toneClass()"
    [class.stat-card--clickable]="clickable()"
    [attr.tabindex]="clickable() ? 0 : null"
    [attr.role]="clickable() ? 'link' : null"
    [attr.aria-label]="card().tooltip || card().label + ': ' + card().value"
    [title]="card().tooltip ?? null"
    (click)="onActivate($event)"
    (keydown.enter)="onActivate($event)"
    (keydown.space)="onActivate($event)"
  >
    <div class="stat-card__top">
      <div class="stat-card__icon" aria-hidden="true">
        <i [class]="card().iconName"></i>
      </div>
      <div class="stat-card__copy">
        <p class="stat-card__label">{{ card().label }}</p>
        <strong class="stat-card__value">{{ card().value }}</strong>
      </div>
    </div>
    <div class="stat-card__bottom">
      @if (card().subtitle) {
        <span class="stat-card__subtitle">{{ card().subtitle }}</span>
      }
      @if (card().trend) {
        <div class="stat-card__trend" [attr.data-trend]="card().trend">
          <i [class]="trendIcon()" aria-hidden="true"></i>
          @if (trendValue()) {
            <span>{{ trendValue() }}</span>
          } @else {
            <span>{{
              card().trend === 'UP' ? 'Sube' : card().trend === 'DOWN' ? 'Baja' : 'Igual'
            }}</span>
          }
        </div>
      }
    </div>
  </article>
}
