<app-modal [(visible)]="dialogVisible" [title]="dialogTitle()" [width]="'min(94vw, 36rem)'">
  <form class="category-form" (submit)="onSubmit(); $event.preventDefault()">
    @if (dialogError()) {
      <app-error-alert variant="inline" [title]="dialogError()" message="" />
    }

    <app-form-section
      [index]="1"
      title="Datos de categoria"
      description="Nombre publico, jerarquia y descripcion para la gondola digital."
    >
      <div class="category-form__grid">
        <div class="category-form__field category-form__field--wide">
          <app-form-field
            label="Nombre"
            [required]="true"
            [(value)]="formName"
            placeholder="Ej. Cereales integrales"
            [error]="formSubmitted() && !formNameValid() ? 'El nombre es obligatorio.' : ''"
            testId="category-name"
          />
        </div>

        <div class="category-form__field category-form__field--wide">
          <label for="category-parent" class="category-form__label">Categoria padre</label>
          <p-select
            inputId="category-parent"
            [options]="parentOptions()"
            [ngModel]="formParentId()"
            (ngModelChange)="formParentId.set($event); formSubmitted.set(false)"
            optionLabel="label"
            optionValue="value"
            placeholder="Seleccionar categoria padre"
            class="w-full category-form__select category-form__select--rich"
            [style]="{ width: '100%' }"
            [appendTo]="'body'"
            panelStyleClass="category-form__select-panel"
          >
            <ng-template #selectedItem let-option>
              <span class="category-form__selected-option">
                <i class="pi pi-sitemap" aria-hidden="true"></i>
                <span>{{ option.label }}</span>
              </span>
            </ng-template>
            <ng-template #item let-option>
              <div class="category-form__option">
                <i class="pi pi-sitemap" aria-hidden="true"></i>
                <div>
                  <strong>{{ option.label }}</strong>
                  <span>{{ option.value === null ? 'Nivel principal' : 'Subcategoria' }}</span>
                </div>
              </div>
            </ng-template>
          </p-select>
        </div>

        <div class="category-form__field category-form__field--wide">
          <app-form-field
            label="Descripcion"
            [multiline]="true"
            [(value)]="formDescription"
            hint="Opcional. Ayuda a diferenciar categorias similares."
            placeholder="Notas internas o texto visible en tienda"
            testId="category-description"
          />
        </div>
      </div>
    </app-form-section>

    <div class="category-form__actions">
      <app-button variant="secondary" type="button" (click)="dialogVisible.set(false)">
        Cancelar
      </app-button>
      <app-button type="submit" [loading]="submitting()" loadingLabel="Guardando...">
        Guardar
      </app-button>
    </div>
  </form>
</app-modal>
