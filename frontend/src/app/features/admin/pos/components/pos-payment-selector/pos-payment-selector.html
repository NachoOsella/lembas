<div
  class="pos-payment-selector"
  role="radiogroup"
  aria-label="Metodo de pago"
  [class.pos-payment-selector--disabled]="disabled()"
>
  @for (option of options; track option.value) {
    <button
      type="button"
      role="radio"
      class="pos-payment-selector__option"
      [class.pos-payment-selector__option--active]="isActive(option.value)"
      [attr.aria-checked]="isActive(option.value)"
      [disabled]="disabled()"
      (click)="selectMethod(option.value)"
      [attr.data-testid]="'pos-method-' + option.value"
    >
      <i class="pos-payment-selector__icon" [class]="option.icon" aria-hidden="true"></i>
      <span class="pos-payment-selector__label">{{ option.label }}</span>
    </button>
  }
</div>
