<app-toast />

<div class="pos-page">
  <app-page-header
    eyebrow="Punto de venta"
    title="Venta presencial"
    description="Busca un producto, agregalo al carrito y elegi el metodo de pago. F8 cobra la venta actual."
  >
    @if (isAdmin()) {
      <app-select
        class="pos-page__branch-select"
        inputId="pos-branch"
        name="pos-branch"
        [options]="branchOptions()"
        optionLabel="label"
        optionValue="value"
        placeholder="Seleccionar sucursal"
        [value]="selectedBranchId()"
        (valueChange)="onBranchSelected($event)"
        data-testid="pos-branch-select"
      />
    }

    @if (cashSession(); as session) {
      <app-badge tone="success" icon="pi pi-check-circle" data-testid="cash-session-badge">
        Caja abierta #{{ session.id }}
      </app-badge>
      <app-button
        variant="ghost"
        size="sm"
        icon="pi pi-refresh"
        ariaLabel="Refrescar estado de la caja"
        (click)="refreshCashSession()"
        data-testid="refresh-cash-session-button"
      ></app-button>
    } @else if (!isCashSessionLoading()) {
      <app-badge tone="danger" icon="pi pi-exclamation-circle" data-testid="cash-session-missing">
        Sin caja abierta
      </app-badge>
      <app-button
        variant="primary"
        icon="pi pi-plus"
        routerLink="/admin/cash/open"
        [queryParams]="{ branchId: selectedBranchId() }"
        data-testid="open-cash-button"
        >Abrir caja</app-button
      >
      <app-button
        variant="ghost"
        size="sm"
        icon="pi pi-refresh"
        ariaLabel="Refrescar estado de la caja"
        (click)="refreshCashSession()"
        data-testid="refresh-cash-session-button"
      ></app-button>
    }
  </app-page-header>

  <div class="pos-page__grid">
    <section class="pos-page__left" aria-label="Busqueda de productos">
      <app-pos-product-search [branchId]="resolvedBranchId()" />
    </section>
    <section class="pos-page__right" aria-label="Carrito y cobro">
      <app-pos-cart
        #cartComponent
        [canCheckout]="canCheckout()"
        [processing]="processing()"
        (checkoutRequested)="onCheckout()"
        data-testid="pos-cart-panel"
      />
    </section>
  </div>
</div>

@if (lastResult(); as result) {
  <app-pos-checkout-result-dialog
    [visible]="!!lastResult()"
    [order]="result"
    (newSale)="startNewSale()"
    (hidden)="onResultDialogClosed()"
    data-testid="pos-checkout-result-dialog"
  />
}
