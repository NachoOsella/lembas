<div class="admin-page">
  <app-page-header
    eyebrow="Panel interno"
    title="Usuarios"
    description="Gestion de accesos internos, roles operativos y alcance por sucursal."
  >
    <app-button icon="pi pi-plus" (click)="createUser.emit()"> Nuevo usuario </app-button>
  </app-page-header>

  <section class="users-page__directory" aria-label="Directorio de usuarios internos">
    <app-data-table
      [data]="users()"
      [columns]="userColumns"
      [loading]="loading()"
      [sortable]="true"
      [paginated]="true"
      [lazy]="true"
      [totalRecords]="displayTotalRecords()"
      [first]="first()"
      [rows]="pageSize()"
      [sortField]="sortField()"
      [sortOrder]="sortOrder()"
      (pageChange)="onPageChange($event)"
      (sortChange)="onSort($event)"
      [emptyTitle]="searchQuery().trim() ? 'Sin resultados' : 'No hay usuarios'"
      [emptyDescription]="emptyDescription()"
    >
      <ng-template #toolbar>
        <div class="table-toolbar__info">
          <p class="table-toolbar__kicker">Directorio operativo</p>
          <h2 class="table-toolbar__title">Equipo con acceso al sistema</h2>
        </div>
        <div class="table-toolbar__actions">
          <app-search-bar
            [(value)]="searchQuery"
            placeholder="Buscar por nombre, email..."
            (search)="onSearch($event)"
            (clear)="onSearchClear()"
          />
        </div>
      </ng-template>

      <ng-template #body let-user let-columns="columns">
        <tr>
          <!-- Name cell keeps person identity scannable on wide tables. -->
          <td>
            <span class="user-name"> {{ user.firstName ?? '' }} {{ user.lastName ?? '' }} </span>
          </td>
          <td>
            <span>{{ user.email }}</span>
          </td>
          <td>
            <app-badge [tone]="roleTone(user.role)">
              {{ roleLabel(user.role) }}
            </app-badge>
          </td>
          <td>
            <span>{{ branchName()?.(user.branchId) ?? '—' }}</span>
          </td>
          <td>
            <app-toggle-switch
              size="sm"
              [checked]="user.enabled"
              (checkedChange)="toggleStatus(user)"
              [disabled]="user.id === 1"
              [disabledAppearance]="user.id === 1 ? 'subtleActive' : 'default'"
              [ariaLabel]="'Cambiar estado de ' + user.email"
            />
          </td>
          <td>
            <app-button
              variant="ghost"
              size="sm"
              icon="pi pi-pencil"
              [iconOnly]="true"
              [ariaLabel]="'Editar ' + user.email"
              (click)="editUser.emit(user)"
            />
          </td>
        </tr>
      </ng-template>
    </app-data-table>
  </section>
</div>
