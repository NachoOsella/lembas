<div class="admin-page orders-page">
  <app-page-header
    eyebrow="Pedidos"
    title="Gestion de pedidos"
    description="Administra pedidos online y POS. Las ordenes online avanzan por estados de preparacion hasta la entrega."
  />

  @if (store.error()) {
    <app-error-alert variant="inline" [title]="store.error()" message="">
      <app-button variant="secondary" size="sm" (click)="store.load()">Reintentar</app-button>
    </app-error-alert>
  }

  <app-order-filters
    [status]="store.filters().status"
    [type]="store.filters().type"
    [branchId]="store.filters().branchId"
    [from]="store.filters().from"
    [to]="store.filters().to"
    [search]="store.filters().search"
    [branches]="store.branches()"
    [branchRestricted]="store.isBranchRestricted()"
    (statusChange)="store.setStatus($event)"
    (typeChange)="store.setType($event)"
    (branchChange)="store.setBranch($event)"
    (fromChange)="store.setDateFrom($event)"
    (toChange)="store.setDateTo($event)"
    (searchChange)="store.setSearch($event)"
    (reset)="store.clearFilters()"
  />

  <app-order-table
    [orders]="store.orders()"
    [loading]="store.loading()"
    [totalRecords]="store.totalRecords()"
    [first]="store.table().first"
    [pageSize]="store.table().pageSize"
    [sortField]="store.table().sortField"
    [sortOrder]="store.table().sortOrder"
    (pageChange)="store.setPage($event.first, $event.rows)"
    (sortChange)="store.setSort($event.field, $event.order)"
    (view)="viewOrder($event)"
    (quickAction)="openQuickConfirm($event)"
    (cancel)="openCancelConfirm($event)"
  />
</div>

<app-confirm-dialog
  [visible]="confirmVisible()"
  [mode]="confirmMode()"
  [title]="pendingAction()?.confirmTitle ?? ''"
  [message]="pendingAction()?.confirmMessage ?? pendingAction()?.description ?? ''"
  [confirmLabel]="pendingAction()?.label ?? 'Confirmar'"
  [destructive]="pendingAction()?.destructive ?? false"
  reasonLabel="Motivo de cancelacion"
  reasonPlaceholder="Ej: cliente desiste del pedido, mercaderia danada, etc."
  [reasonMaxLength]="500"
  [reasonRequired]="pendingAction()?.requiresReason ?? false"
  [(reason)]="cancelReason"
  (confirmed)="executeConfirmedAction()"
  (cancelled)="cancelQuickConfirm()"
/>
