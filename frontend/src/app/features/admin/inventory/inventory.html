<div class="admin-page inventory-page">
  <app-page-header
    eyebrow="Inventario"
    title="Stock por producto"
    description="Stock disponible agrupado por producto y sucursal. El vencimiento muestra la fecha del lote mas proximo a vencer."
  >
    @if (canManageInventory()) {
      <app-button icon="pi pi-plus" (click)="openCreateLot()">Nuevo lote</app-button>
    }
  </app-page-header>

  @if (store.listError()) {
    <app-error-alert variant="inline" [title]="store.listError()" message="">
      <app-button variant="secondary" size="sm" (click)="store.refresh()">Reintentar</app-button>
    </app-error-alert>
  }

  <app-inventory-table
    [products]="store.products()"
    [loading]="store.loading()"
    [state]="store.viewState()"
    [totalRecords]="store.totalRecords()"
    [first]="store.first()"
    [rows]="store.pageSize()"
    [canManage]="canManageInventory()"
    (pageChanged)="store.changePage($event)"
    (sortChanged)="store.changeSort($event)"
    (viewLots)="viewLots($event)"
    (adjust)="store.openAdjustment($event)"
    (emptyAction)="navigateToReceipts()"
  >
    <app-inventory-toolbar
      [search]="store.searchValue()"
      [branchId]="store.selectedBranchId()"
      [expiringSoon]="store.expiringSoon()"
      [branchOptions]="branchOptions()"
      (searchChanged)="store.search($event)"
      (branchChanged)="store.selectBranch($event)"
      (expiringSoonChanged)="store.setExpiringSoon($event)"
    />
  </app-inventory-table>
</div>

<app-stock-lot-form
  [visible]="store.createLotVisible()"
  (visibleChange)="store.setCreateLotVisible($event)"
  [branches]="branchOptions()"
  [initialBranchId]="assignedBranchId()"
  [branchRestricted]="isBranchRestricted()"
  [suggestions]="store.productSuggestions()"
  [saving]="store.lotSaving()"
  [error]="store.lotError()"
  (productSearch)="store.searchProducts($event)"
  (submitted)="store.createLot($event)"
/>

<app-stock-adjustment-form
  [visible]="store.adjustmentVisible()"
  (visibleChange)="store.setAdjustmentVisible($event)"
  [branches]="branchOptions()"
  [initialProduct]="store.adjustmentInitialProduct()"
  [initialBranchId]="store.adjustmentInitialBranchId()"
  [branchRestricted]="isBranchRestricted()"
  [suggestions]="store.productSuggestions()"
  [stockLabel]="store.adjustmentStockLabel()"
  [saving]="store.adjustmentSaving()"
  [error]="store.adjustmentError()"
  (productSearch)="store.searchProducts($event)"
  (stockContextChanged)="store.updateAdjustmentStock($event.product, $event.branchId)"
  (submitted)="store.createAdjustment($event)"
/>
