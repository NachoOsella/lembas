<div class="admin-page">
  <app-page-header
    eyebrow="Catalogo"
    title="Productos"
    description="Gestion de precios, categorias, imagenes y estado online de la tienda."
  >
    <app-button icon="pi pi-plus" (click)="onCreate()"> Nuevo producto </app-button>
  </app-page-header>

  @if (error()) {
    <app-error-alert variant="inline" [title]="error()" message="">
      <app-button variant="secondary" size="sm" (click)="refresh()">Reintentar</app-button>
    </app-error-alert>
  }

  <section class="products-page__directory" aria-label="Directorio de productos del catalogo">
    <app-data-table
      [data]="products()"
      [columns]="columns"
      [loading]="loading()"
      [sortable]="true"
      [paginated]="true"
      [lazy]="true"
      [totalRecords]="totalRecords()"
      [first]="first()"
      [rows]="rows()"
      [rowsPerPageOptions]="[10, 20, 30]"
      [sortField]="sortField()"
      [sortOrder]="sortOrder()"
      emptyTitle="No hay productos"
      emptyDescription="Crea el primer producto para empezar a publicar el catalogo."
      (pageChange)="onPageChange($event)"
      (sortChange)="onSort($event)"
    >
      <ng-template #toolbar>
        <div class="table-toolbar__info">
          <p class="table-toolbar__kicker">Catalogo comercial</p>
          <h2 class="table-toolbar__title">Productos disponibles</h2>
        </div>
        <div class="table-toolbar__actions">
          <div class="table-toolbar__filters">
            <app-search-bar
              [(value)]="searchQuery"
              placeholder="Buscar por nombre o barcode..."
              (search)="onSearch($event)"
              (clear)="onSearchClear()"
            />
            <app-select
              [options]="categoryOptions()"
              [(value)]="categoryId"
              (valueChange)="onFilterChange()"
            />
            <app-select
              [options]="statusOptions"
              [(value)]="onlineStatus"
              (valueChange)="onFilterChange()"
            />
          </div>
        </div>
      </ng-template>

      <ng-template #body let-product>
        <tr>
          <td>
            <div class="product-name-cell">
              <img
                [src]="product.imageUrl || '/assets/product-placeholder.svg'"
                [alt]="product.name"
                class="product-thumb"
              />
              <div>
                <span class="product-name">{{ product.name }}</span>
                <small
                  >{{ product.brandName || 'Sin marca' }} ·
                  {{ product.barcode || 'Sin barcode' }}</small
                >
              </div>
            </div>
          </td>
          <td>{{ product.categoryName }}</td>
          <td>{{ formatPrice(product.salePrice) }}</td>
          <td>
            <app-status-badge [status]="product.onlineStatus" [config]="productStatusBadges" />
          </td>
          <td>
            <div class="table-actions">
              <app-menu #statusMenu [model]="statusActions(product)" [popup]="true" appendTo="body" />
              <app-button
                variant="ghost"
                size="sm"
                icon="pi pi-sync"
                [iconOnly]="true"
                [ariaLabel]="'Cambiar estado de ' + product.name"
                (click)="statusMenu.toggle($event)"
              />
              <app-button
                variant="ghost"
                size="sm"
                icon="pi pi-pencil"
                [iconOnly]="true"
                [ariaLabel]="'Editar ' + product.name"
                [routerLink]="['/admin/products', product.id, 'edit']"
              />
              <app-button
                variant="ghost"
                size="sm"
                icon="pi pi-trash"
                [iconOnly]="true"
                [ariaLabel]="'Eliminar ' + product.name"
                (click)="requestDelete(product)"
              />
            </div>
          </td>
        </tr>
      </ng-template>
    </app-data-table>
  </section>
</div>

<!-- Delete confirmation -->
<app-confirm-dialog
  [visible]="!!productToDelete()"
  title="Eliminar producto"
  [message]="
    'Vas a eliminar ' + (productToDelete()?.name ?? 'este producto') + ' del catalogo activo.'
  "
  confirmLabel="Eliminar"
  [destructive]="true"
  (confirmed)="confirmDelete()"
  (cancelled)="productToDelete.set(null)"
></app-confirm-dialog>

<!-- Status change confirmation -->
<app-confirm-dialog
  [visible]="!!productToChangeStatus() && !!pendingStatusAction()"
  title="Cambiar estado online"
  [message]="
    'Vas a cambiar ' +
    (productToChangeStatus()?.name ?? 'este producto') +
    ' a ' +
    (pendingStatusAction()?.label ?? 'otro estado') +
    '.'
  "
  [confirmLabel]="pendingStatusAction()?.label ?? 'Confirmar'"
  cancelLabel="Volver"
  [destructive]="pendingStatusAction()?.targetStatus === 'HIDDEN'"
  (confirmed)="confirmStatusChange()"
  (cancelled)="cancelStatusChange()"
></app-confirm-dialog>
