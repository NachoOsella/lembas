<div class="product-form-page">
  <app-page-header
    eyebrow="Catalogo"
    [title]="title()"
    description="Completa la informacion comercial, precio, categoria e imagen visible del producto."
  >
    <app-button variant="secondary" routerLink="/admin/products" icon="pi pi-arrow-left">
      Volver
    </app-button>
  </app-page-header>

  @if (error()) {
    <app-error-alert variant="inline" [title]="error()" message="" />
  }

  @if (loading()) {
    <app-skeleton height="24rem" />
  } @else {
    <form class="product-form" (submit)="save(); $event.preventDefault()">
      <app-form-section
        [index]="1"
        title="Datos principales"
        description="Nombre, categoria y datos de identificacion para el backoffice."
      >
        <div class="product-form__grid">
          <div class="product-form__field product-form__field--wide">
            <app-form-field
              label="Nombre"
              [required]="true"
              [error]="submitted() && !name().trim() ? 'El nombre es obligatorio.' : ''"
              [(value)]="name"
              placeholder="Ej. Granola artesanal"
              testId="product-name"
            />
          </div>

          <div class="product-form__field">
            <label for="product-category" class="product-form__label"
              >Categoria <span aria-hidden="true">*</span></label
            >
            <p-select
              inputId="product-category"
              [options]="categoryOptions()"
              [ngModel]="categoryId()"
              (ngModelChange)="categoryId.set($event)"
              name="categoryId"
              optionLabel="label"
              optionValue="value"
              placeholder="Seleccionar"
              appendTo="body"
              [class.ng-invalid]="submitted() && !categoryId()"
            />
            @if (submitted() && !categoryId()) {
              <small class="product-form__error">La categoria es obligatoria.</small>
            }
          </div>

          <div class="product-form__field">
            <app-form-field
              label="Marca"
              [(value)]="brandName"
              placeholder="Ej. Lembas"
              testId="product-brand"
            />
          </div>

          <div class="product-form__field">
            <app-form-field
              label="Barcode"
              [error]="submitted() && !barcodeValid() ? 'Usa entre 4 y 100 caracteres.' : ''"
              [(value)]="barcode"
              placeholder="7790001000012"
              testId="product-barcode"
            />
          </div>

          <div class="product-form__field">
            <label for="product-status" class="product-form__label">Estado online</label>
            <p-select
              inputId="product-status"
              [options]="statusOptions()"
              [ngModel]="onlineStatus()"
              (ngModelChange)="onlineStatus.set($event)"
              name="onlineStatus"
              optionLabel="label"
              optionValue="value"
              appendTo="body"
            />
          </div>

          <div class="product-form__field product-form__field--wide">
            <app-form-field
              label="Descripcion"
              [multiline]="true"
              [(value)]="description"
              placeholder="Descripcion comercial para tienda y administracion"
              testId="product-description"
            />
          </div>
        </div>
      </app-form-section>

      <app-form-section
        [index]="2"
        title="Precio, stock e imagen"
        description="Valores comerciales y vista previa del producto para mantener una gondola homogenea."
      >
        <div class="product-form__media-grid">
          <div class="product-form__grid">
            <div class="product-form__field">
              <label for="product-price" class="product-form__label"
                >Precio de venta <span aria-hidden="true">*</span></label
              >
              <p-inputnumber
                inputId="product-price"
                [ngModel]="salePrice()"
                (ngModelChange)="salePrice.set($event)"
                name="salePrice"
                mode="currency"
                currency="ARS"
                locale="es-AR"
                [min]="0"
                [class.ng-invalid]="submitted() && (salePrice() === null || salePrice()! < 0)"
              />
              @if (submitted() && (salePrice() === null || salePrice()! < 0)) {
                <small class="product-form__error">El precio debe ser mayor o igual a cero.</small>
              }
            </div>

            <div class="product-form__field">
              <label for="product-min-stock" class="product-form__label">Stock minimo</label>
              <p-inputnumber
                inputId="product-min-stock"
                [ngModel]="minimumStock()"
                (ngModelChange)="minimumStock.set($event)"
                name="minimumStock"
                [min]="0"
              />
            </div>

            <div class="product-form__field product-form__field--wide">
              <app-form-field
                label="URL de imagen"
                [(value)]="imageUrl"
                placeholder="https://..."
                hint="Tambien podes seleccionar un archivo local para generar preview."
                testId="product-image-url"
              />
            </div>

            <div class="product-form__field product-form__field--wide">
              <label for="product-image-file" class="product-form__label"
                >Imagen del producto</label
              >
              <input
                id="product-image-file"
                type="file"
                accept="image/*"
                class="product-form__file"
                (change)="onImageSelected($event)"
              />
            </div>
          </div>

          <aside class="product-form__preview" aria-label="Preview de imagen">
            <img [src]="imagePreview()" alt="Preview del producto" />
            <span class="product-form__preview-label">Preview</span>
          </aside>
        </div>
      </app-form-section>

      <div class="product-form__actions">
        <app-button variant="secondary" type="button" (click)="cancel()"
          >Cancelar</app-button
        >
        <app-button type="submit" [loading]="submitting()" loadingLabel="Guardando..."
          >Guardar producto</app-button
        >
      </div>
    </form>
  }
</div>
