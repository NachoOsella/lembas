<header class="customer-layout__nav">
  <div class="customer-layout__nav-inner">
    <a routerLink="/store" class="customer-layout__brand" aria-label="Volver a la tienda">
      <img src="/brand/lembas-icon.svg?v=4" alt="" width="32" height="32" />
      <span class="customer-layout__brand-text">
        <strong>Lembas</strong>
        <span>Mi cuenta</span>
      </span>
    </a>

    <nav class="customer-layout__links" aria-label="Navegación de cuenta">
      <a
        routerLink="/customer/orders"
        routerLinkActive="customer-layout__link--active"
        class="customer-layout__link"
      >
        Mis pedidos
      </a>
      <a
        routerLink="/customer/profile"
        routerLinkActive="customer-layout__link--active"
        class="customer-layout__link"
      >
        Mi perfil
      </a>
    </nav>

    <div class="customer-layout__user">
      <span class="customer-layout__user-name">{{ userDisplayName() }}</span>
      <button
        type="button"
        class="customer-layout__logout"
        (click)="logout()"
        aria-label="Cerrar sesion"
      >
        <i class="pi pi-sign-out" aria-hidden="true"></i>
        <span class="customer-layout__logout-label">Salir</span>
      </button>
    </div>
  </div>
</header>

<main class="customer-layout__main">
  <router-outlet />
</main>

<footer class="customer-layout__footer">
  <span>{{ copyright }}</span>
  <a routerLink="/store" class="customer-layout__footer-link">Volver a la tienda</a>
</footer>
