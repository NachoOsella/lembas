spring:
  application:
    name: lembas-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:lembas}
    username: ${DB_USER:lembas}
    password: ${DB_PASSWORD:lembas}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    jwt-secret: ${JWT_SECRET:change-me-to-at-least-256-bits-before-running-outside-local-dev}
    jwt-expiration: 24h
  mercado-pago:
    access-token: ${MP_ACCESS_TOKEN:}
    webhook-secret: ${MP_WEBHOOK_SECRET:}
    success-url: ${MP_SUCCESS_URL:http://localhost:4200/customer/payment/callback}
    failure-url: ${MP_FAILURE_URL:http://localhost:4200/customer/payment/callback}
    pending-url: ${MP_PENDING_URL:http://localhost:4200/customer/payment/callback}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
