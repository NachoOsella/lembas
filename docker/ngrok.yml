# ngrok tunnel configuration for Mercado Pago sandbox testing.
#
# Used by the `dev-tunnel` Compose profile to expose the backend to the
# public internet so Mercado Pago can deliver webhook notifications
# against a local checkout.
#
# Start with:
#   cd docker
#   docker compose --env-file .env --profile dev-tunnel up -d
#   docker compose --env-file .env --profile dev-tunnel logs -f ngrok
#
# The first log line includes the public https://<random>.ngrok-free.app URL.
# Copy that URL into the Mercado Pago webhook configuration as
#   https://<random>.ngrok-free.app/api/webhooks/mercadopago
#
# The authtoken is intentionally NOT declared here: docker compose only
# interpolates ${VAR} in compose files, not in bind-mounted config files,
# so a literal ${NGROK_AUTHTOKEN} would reach ngrok as-is. The
# The Compose profile injects the token via the NGROK_AUTHTOKEN environment
# variable, which ngrok reads directly.

version: "2"
tunnels:
  backend:
    proto: http
    # Point at the Nginx web container so Angular SPA routes work.
    # The backend API is reached via /api/* through nginx's proxy_pass.
    addr: web:8080
    schemes:
      - https
    inspect: true
    host_header: rewrite
