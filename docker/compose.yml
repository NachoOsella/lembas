# Production Docker Compose stack for Dietetica Lembas.
# Run from this directory with:
#   docker compose --env-file .env up -d --build
#
# Services:
#   db         PostgreSQL 16
#   backend    Spring Boot 3 (Java 21)
#   web        Nginx serving the Angular app
#   ngrok      Public tunnel for MP sandbox (skips when NGROK_AUTHTOKEN is empty)
services:
  db:
    image: postgres:16-alpine
    container_name: lembas-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-lembas}
      POSTGRES_USER: ${DB_USER:-lembas}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "${DB_BIND_ADDRESS:-127.0.0.1}:${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: lembas-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-lembas}
      DB_USER: ${DB_USER:-lembas}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0 -XX:+UseContainerSupport}
      # Gateway mode: fake (in-memory) or mercadopago (real HTTP).
      PAYMENTS_GATEWAY: ${PAYMENTS_GATEWAY:-fake}
      # Required when SPRING_PROFILES_ACTIVE=prod and MercadoPago integration is enabled.
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
      # Required when SPRING_PROFILES_ACTIVE=prod and MercadoPago webhooks are enabled.
      MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET:-}
      # Public outbound webhook URL embedded in each checkout preference so MP
      # knows where to POST notifications (e.g. the ngrok tunnel in sandbox).
      MP_NOTIFICATION_URL: ${MP_NOTIFICATION_URL:-}
      MP_SUCCESS_URL: ${MP_SUCCESS_URL:-http://localhost/customer/payment/callback}
      MP_FAILURE_URL: ${MP_FAILURE_URL:-http://localhost/customer/payment/callback}
      MP_PENDING_URL: ${MP_PENDING_URL:-http://localhost/customer/payment/callback}
    volumes:
      - backend-uploads:/app/uploads
    tmpfs:
      - /tmp
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -qE '\"status\"[[:space:]]*:[[:space:]]*\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 40s

  web:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: lembas-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:8080"
    volumes:
      - backend-uploads:/usr/share/nginx/uploads:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ngrok tunnel — exposes the web container publicly so Mercado Pago can
  # deliver webhook notifications against a local checkout during sandbox
  # testing.
  #
  # If NGROK_AUTHTOKEN is set in .env the tunnel starts automatically;
  # otherwise the container prints a reminder and pauses without error.
  #
  # After startup, get the public URL from:
  #   docker compose logs ngrok
  # Look for:  msg="started tunnel" object-url="https://<random>.ngrok-free.app"
  # Then set MP_NOTIFICATION_URL in .env to that URL + /api/webhooks/mercadopago
  # and restart the backend:
  #   docker compose up -d --force-recreate backend
  ngrok:
    image: ngrok/ngrok:3
    container_name: lembas-ngrok
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    volumes:
      - ./ngrok.yml:/etc/ngrok/ngrok.yml:ro
    ports:
      - "${NGROK_WEB_PORT:-4040}:4040"
    depends_on:
      web:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -z "$$NGROK_AUTHTOKEN" ]; then
          echo "=============================================================="
          echo "  ngrok skipped: NGROK_AUTHTOKEN is not set."
          echo "  Set NGROK_AUTHTOKEN in docker/.env to enable the public"
          echo "  tunnel for Mercado Pago sandbox testing."
          echo "=============================================================="
          while true; do sleep 3600; done
        fi
        exec ngrok start --config /etc/ngrok/ngrok.yml backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4040/api/tunnels | grep -q 'public_url'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  pgdata:
  backend-uploads:
